name: Update fromager submodule

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update fromager submodule to latest
        run: git submodule update --remote fromager

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update fromager submodule"
          title: "chore: update fromager submodule"
          body: |
            Automated update of the `fromager` submodule to the latest upstream commit.
          branch: auto-update-fromager-submodule
          assignees: ${{ github.repository_owner }}
